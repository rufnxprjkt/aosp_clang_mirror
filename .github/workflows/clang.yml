name: Update Clang Prebuilts

concurrency:
  group: ${{ github.workflow }}
  # Since it runs every 3 hours, this will prevent overlaps if a run hangs
  cancel-in-progress: true

permissions:
  contents: write
  actions: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  update:
    runs-on: ubuntu-slim
    env:
      AOSP_REPO: "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+/mirror-goog-main-llvm-toolchain-source"
      AOSP_ARCHIVE: "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/mirror-goog-main-llvm-toolchain-source"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Dependencies
        run: sudo apt update && sudo apt install -qq aria2 git jq

      - name: Fetch latest Clang info
        id: fetch-latest
        run: |
          # pipefail prevents continuing when curl fails inside the pipeline
          set -euo pipefail

          CURL_FLAGS=(
            --retry 5
            --retry-delay 5
            --retry-all-errors
            -fsSL
          )

          LATEST_CLANG=$(curl "${CURL_FLAGS[@]}" "$AOSP_REPO" \
            | grep -oP 'href="[^"]*clang-r[0-9]+[a-z]?/' \
            | grep -oP 'clang-r[0-9]+[a-z]?' \
            | sort -V \
            | tail -n1)
          BUILD_ID=$(curl "${CURL_FLAGS[@]}" \
            "${AOSP_REPO}/${LATEST_CLANG}/BUILD_INFO?format=TEXT" \
            | base64 -d \
            | jq -r .bid)
          CLANG_VERSION=$(curl "${CURL_FLAGS[@]}" \
            "${AOSP_REPO}/${LATEST_CLANG}/AndroidVersion.txt?format=TEXT" \
            | base64 -d \
            | head -n1)

          echo "latest_clang=$LATEST_CLANG" >> "$GITHUB_OUTPUT"
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "clang_version=$CLANG_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=${LATEST_CLANG}-${BUILD_ID}" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: exists
        run: |
          TAG="${{ steps.fetch-latest.outputs.new_tag }}"
          if git tag --list "$TAG" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clang release exists
        if: steps.exists.outputs.exists == 'true'
        run: echo "Latest Clang ${{ steps.fetch-latest.outputs.new_tag }} is already released."

      - name: Download Clang
        if: steps.exists.outputs.exists == 'false'
        run: |
          WORKSPACE="toolchain"
          FILE="${{ steps.fetch-latest.outputs.latest_clang }}.tar.gz"
          URL="${AOSP_ARCHIVE}/${{ steps.fetch-latest.outputs.latest_clang }}.tar.gz?format=tar.gz"
          
          mkdir -p "$WORKSPACE"

          curl -fL --retry 5 --retry-delay 5 --retry-all-errors -o "$WORKSPACE/$FILE" "$URL"

      - name: Create release
        if: steps.exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.fetch-latest.outputs.new_tag }}
          name: Clang prebuilts ${{ steps.fetch-latest.outputs.new_tag }}
          files: toolchain/${{ steps.fetch-latest.outputs.latest_clang }}.tar.gz
          generate_release_notes: false
          body: |
            Automated release asset

      - name: Telegram Notify
        if: steps.exists.outputs.exists == 'false'
        env:
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          HOST: ${{ github.server_url }}
          REPO: ${{ github.repository }}
        run: |
          # Context and inputs
          REPO_URL="${HOST}/${REPO}"
          TAG_NAME="${{ steps.fetch-latest.outputs.latest_clang }}"
          FULL_TAG="${{ steps.fetch-latest.outputs.new_tag }}"
          CLANG_VERSION="${{ steps.fetch-latest.outputs.clang_version }}"

          # Clang information
          ALT_VER="${TAG_NAME#clang-}"
          BID="${{ steps.fetch-latest.outputs.build_id }}"

          # Download links
          AOSP_TARBALL="${AOSP_ARCHIVE}/${TAG_NAME}.tar.gz?format=tar.gz"
          GITHUB_TARBALL="${REPO_URL}/releases/download/${FULL_TAG}/${TAG_NAME}.tar.gz"

          MESSAGE=$(cat <<-EOF
          *Google Clang Prebuilt Update*

          *Clang Version*: ${CLANG_VERSION} (${ALT_VER})
          *Build ID*: ${BID}

          *Download tar.gz*:
          [Download (GitHub mirror)](${GITHUB_TARBALL})
          [Download (AOSP source)](${AOSP_TARBALL})
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d disable_web_page_preview=true \
            -d parse_mode=Markdown \
            --data-urlencode "text=${MESSAGE}"
